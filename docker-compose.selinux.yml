# SELinux override for Podman on SELinux-enabled hosts such as AlmaLinux 9.
#
# Usage:
#   podman compose -f docker-compose.yml -f docker-compose.selinux.yml [command]
#
# bin/phase5 applies this automatically when PHASE5_RUNTIME=podman and
# getenforce returns Enforcing.

services:
  db:
    security_opt:
      - label=disable

  app-phase5:
    security_opt:
      - label=disable

  app-ubuntu26-ruby4:
    security_opt:
      - label=disable

  app-ubuntu26-ruby4-proxy:
    security_opt:
      - label=disable

  app-ubuntu26-ruby4-worker:
    security_opt:
      - label=disable

  app-ubuntu26-ruby4-scheduler:
    security_opt:
      - label=disable

  app-almalinux9-ruby4:
    security_opt:
      - label=disable

  app-almalinux9-ruby4-proxy:
    security_opt:
      - label=disable

  app-almalinux9-ruby4-worker:
    security_opt:
      - label=disable

  app-almalinux9-ruby4-scheduler:
    security_opt:
      - label=disable
