      CHOWN_SOURCE_TREE: "0"
      EXECJS_RUNTIME: Node
      LANG: ja_JP.UTF-8
      LC_ALL: ja_JP.UTF-8
      SECRET_KEY_BASE: joruri_gw_secret_key_base_development_docker
    ports:
      - "3001:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/var/share/jorurigw:cached
      - bundle_ubuntu18_ruby23_rails5:/var/share/jorurigw/vendor/bundle
      - bundle_config_ubuntu18_ruby23_rails5:/var/share/jorurigw/.bundle
      - log_ubuntu18_ruby23_rails5:/var/share/jorurigw/log
      - public_assets_ubuntu18_ruby23_rails5:/var/share/jorurigw/public/assets
      - tmp_ubuntu18_ruby23_rails5:/var/share/jorurigw/tmp
